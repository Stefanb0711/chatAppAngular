<div class="single-contact-container">

  <a href="#" class="list-group-item list-group-item-action py-3 lh-sm" aria-current="true">
    <div class="d-flex w-100 align-items-center single-contact-container">

      <div class="image-crop">
        <img [src]="authServ.currentUser.profile_picture"  />
      </div>

      <div class="user-info">
        <strong class="mb-1">Username</strong> <p>{{authServ.currentUser.username}}</p>
      </div>
      <div class="user-info">
        <strong class="mb-1">Email</strong> <p>{{authServ.currentUser.email}}</p>
      </div>

    </div>
  </a>

</div>
