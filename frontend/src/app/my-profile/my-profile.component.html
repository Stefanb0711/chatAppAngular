<div class="single-contact-container">

    <div class="d-flex w-100 align-items-center single-contact-container">

      <div class="image-crop" *ngIf="!editModeProfilePicture" (click)="setEditModeProfilePicture()">
        <img [src]="authServ.currentUser.profile_picture"/>

        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-pen" viewBox="0 0 16 16">
          <path d="m13.498.795.149-.149a1.207 1.207 0 1 1 1.707 1.708l-.149.148a1.5 1.5 0 0 1-.059 2.059L4.854 14.854a.5.5 0 0 1-.233.131l-4 1a.5.5 0 0 1-.606-.606l1-4a.5.5 0 0 1 .131-.232l9.642-9.642a.5.5 0 0 0-.642.056L6.854 4.854a.5.5 0 1 1-.708-.708L9.44.854A1.5 1.5 0 0 1 11.5.796a1.5 1.5 0 0 1 1.998-.001m-.644.766a.5.5 0 0 0-.707 0L1.95 11.756l-.764 3.057 3.057-.764L14.44 3.854a.5.5 0 0 0 0-.708z"/>
        </svg>

      </div>

      <div>
          <input class="input-bubble input-field" placeholder="{{authServ.currentUser.profile_picture}}" /> <button>Edit</button>
      </div>


      <div>
        <div class="user-info" *ngIf="!editModeUsername" (click)="setEditModeUsername()">
          <strong class="mb-1">Username</strong> <p>{{authServ.currentUser.username}}

          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-pen" viewBox="0 0 16 16">
            <path d="m13.498.795.149-.149a1.207 1.207 0 1 1 1.707 1.708l-.149.148a1.5 1.5 0 0 1-.059 2.059L4.854 14.854a.5.5 0 0 1-.233.131l-4 1a.5.5 0 0 1-.606-.606l1-4a.5.5 0 0 1 .131-.232l9.642-9.642a.5.5 0 0 0-.642.056L6.854 4.854a.5.5 0 1 1-.708-.708L9.44.854A1.5 1.5 0 0 1 11.5.796a1.5 1.5 0 0 1 1.998-.001m-.644.766a.5.5 0 0 0-.707 0L1.95 11.756l-.764 3.057 3.057-.764L14.44 3.854a.5.5 0 0 0 0-.708z"/>
          </svg>
        </p>

        </div>

        <div class="input-bubble input-field" *ngIf="editModeUsername">
          <input class="input-bubble input-field" placeholder="{{authServ.currentUser.username}}" /> <button>Edit</button>
        </div>
      </div>


      <div>
        <div class="user-info" *ngIf="!editModePassword" (click)="setEditModePassword()">
          <strong class="mb-1">Email</strong> <p>{{authServ.currentUser.password}}
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-pen" viewBox="0 0 16 16">
            <path d="m13.498.795.149-.149a1.207 1.207 0 1 1 1.707 1.708l-.149.148a1.5 1.5 0 0 1-.059 2.059L4.854 14.854a.5.5 0 0 1-.233.131l-4 1a.5.5 0 0 1-.606-.606l1-4a.5.5 0 0 1 .131-.232l9.642-9.642a.5.5 0 0 0-.642.056L6.854 4.854a.5.5 0 1 1-.708-.708L9.44.854A1.5 1.5 0 0 1 11.5.796a1.5 1.5 0 0 1 1.998-.001m-.644.766a.5.5 0 0 0-.707 0L1.95 11.756l-.764 3.057 3.057-.764L14.44 3.854a.5.5 0 0 0 0-.708z"/>

        </p>
        </div>

        <div class="input-bubble input-field" *ngIf="editModePassword">
          <input class="input-bubble input-field" placeholder="{{authServ.currentUser.password}}" /> <button>Edit</button>
        </div>
      </div>


      <div>
        <div class="user-info" *ngIf="!editModeEmail" (click)="setEditModeEmail()">
          <strong class="mb-1">Email</strong> <p>{{authServ.currentUser.email}}
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-pen" viewBox="0 0 16 16">
            <path d="m13.498.795.149-.149a1.207 1.207 0 1 1 1.707 1.708l-.149.148a1.5 1.5 0 0 1-.059 2.059L4.854 14.854a.5.5 0 0 1-.233.131l-4 1a.5.5 0 0 1-.606-.606l1-4a.5.5 0 0 1 .131-.232l9.642-9.642a.5.5 0 0 0-.642.056L6.854 4.854a.5.5 0 1 1-.708-.708L9.44.854A1.5 1.5 0 0 1 11.5.796a1.5 1.5 0 0 1 1.998-.001m-.644.766a.5.5 0 0 0-.707 0L1.95 11.756l-.764 3.057 3.057-.764L14.44 3.854a.5.5 0 0 0 0-.708z"/>

        <div class="input-bubble input-field" *ngIf="editModeEmail">
          <input class="input-bubble input-field" placeholder="{{authServ.currentUser.email}}" /> <button>Edit</button>
        </div>
      </div>



      <div>

      </div>


    </div>

</div>
